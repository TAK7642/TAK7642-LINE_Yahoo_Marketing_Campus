<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ディスプレイAdv">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a52">
<meta name="format-detection" content="telephone=no">
<title>LINEヤフー広告 ディスプレイ広告 Advanced 4択クイズ</title>
<style>
:root{--green:#06C755;--navy:#0a0a52;--bg:#f4f6f8;--card:#fff;--gray:#8a93a0;--line:#e3e7ec;--red:#e23b3b;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg);color:#1b1f24;padding-bottom:env(safe-area-inset-bottom);}
header{background:var(--navy);color:#fff;padding:calc(12px + env(safe-area-inset-top)) 14px 12px;display:flex;align-items:center;gap:10px;}
header .dot{width:22px;height:22px;border-radius:6px;background:var(--green);display:inline-block;flex:none;}
header h1{font-size:15px;margin:0;font-weight:700;flex:1;line-height:1.3;}
.backbtn{flex:none;display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:10px;padding:7px 11px;font-size:13px;font-weight:700;text-decoration:none;cursor:pointer;white-space:nowrap;}
.backbtn:active{transform:scale(.96);}
.wrap{max-width:680px;margin:0 auto;padding:14px;}
.resumeRow{margin-bottom:10px;}
#resume{width:100%;background:var(--green);color:#fff;border:none;font-weight:700;padding:13px;font-size:15px;border-radius:12px;}
#resume:disabled{background:#c7ccd2;cursor:default;}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;}
select,button{font-family:inherit;font-size:14px;border-radius:10px;border:1px solid var(--line);background:#fff;padding:9px 12px;cursor:pointer;}
select{flex:1;min-width:140px;}
button:active{transform:scale(.97);}
.bar{height:8px;background:#e3e7ec;border-radius:99px;overflow:hidden;margin:6px 0 4px;}
.bar > i{display:block;height:100%;background:var(--green);width:0;transition:width .3s;}
.stat{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-bottom:12px;}
.stat b{color:#1b1f24;}
.card{background:var(--card);border-radius:18px;box-shadow:0 4px 18px rgba(10,10,40,.08);padding:20px 18px 18px;position:relative;}
.tagrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.tag{font-size:11px;font-weight:700;color:var(--green);background:#eafaf0;padding:4px 10px;border-radius:99px;}
.num{font-size:12px;color:var(--gray);}
.qlabel{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--gray);margin-bottom:8px;}
.qtext{font-size:19px;line-height:1.6;font-weight:700;margin-bottom:16px;}
.opt{display:flex;align-items:flex-start;gap:10px;border:2px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer;background:#fff;transition:.12s;}
.opt:hover{border-color:#cfd6df;}
.opt input{width:20px;height:20px;margin-top:1px;accent-color:var(--navy);flex:none;}
.opt .txt{font-size:15px;line-height:1.6;flex:1;}
.opt .mark{font-size:22px;font-weight:800;line-height:1;flex:none;width:24px;text-align:center;}
.opt.correct{border-color:var(--green);background:#eafaf0;}
.opt.wrong{border-color:var(--red);background:#fdeaea;}
.opt.disabled{cursor:default;}
.feedback{text-align:center;font-size:17px;font-weight:800;margin:6px 0 2px;min-height:24px;}
.feedback.ok{color:var(--green);}
.feedback.ng{color:var(--red);}
.nav{display:flex;gap:10px;margin-top:14px;}
.nav button{flex:1;}
.nav .primary{background:var(--green);color:#fff;border:none;font-weight:700;}
.modeRow{display:flex;gap:8px;margin-bottom:10px;}
.modeRow button{flex:1;font-size:13px;padding:8px;}
.modeRow button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.done{text-align:center;padding:46px 20px;}
.foot{text-align:center;font-size:11px;color:var(--gray);margin:18px 0;}
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>LINEヤフー広告 ディスプレイ広告 Advanced 4択クイズ</h1>
  <a class="backbtn" href="../">← メニュー</a>
</header>
<div class="wrap">
  <div class="resumeRow"><button id="resume">▶ 前回の続きから再開</button></div>
  <div class="modeRow">
    <button id="mAll" class="on">全問題</button>
    <button id="mWeak">間違えた問題だけ</button>
  </div>
  <div class="controls">
    <select id="secSel"></select>
    <button id="shuffle">🔀 シャッフル</button>
    <button id="reset">↺ 成績リセット</button>
  </div>
  <div class="bar"><i id="prog"></i></div>
  <div class="stat"><span>解答 <b id="pdone">0</b> / <b id="ptot">0</b></span><span>正解 <b id="pknown">0</b>　不正解 <b id="pweak">0</b>　正答率 <b id="prate">-</b></span></div>
  <div id="cardArea"></div>
  <div class="nav">
    <button id="prev">← 前へ</button>
    <button class="primary" id="next">次へ →</button>
  </div>
  <p class="foot">選択肢のチェックボックスを選ぶと自動で答え合わせ（○＝正解／×＝不正解）。「メニュー」を押しても成績・進捗は保存され、「▶ 前回の続きから再開」で続きから再開できます。<br>LINEヤフーマーケティングキャンパス「ディスプレイ広告 Advanced」教材より作成</p>
</div>
<script>
const DATA = [{"sec": "1.レポート作成", "q": "パフォーマンスレポート・テンプレート作成で最初に入力するものは", "a": "レポート・テンプレート名", "d": ["データの集計期間", "レポート項目", "ダウンロード形式"]}, {"sec": "1.レポート作成", "q": "レポート作成完了の連絡メールを受け取る場合に必要な設定は", "a": "スケジュールの設定時にメールアドレスを入力する", "d": ["レポート項目でメールを選択する", "レポート名にメールアドレスを入れる", "データ集計期間を毎日にする"]}, {"sec": "1.レポート作成", "q": "レポートをダウンロードできるファイル形式は", "a": "CSV形式", "d": ["PDF形式", "Excel（xlsx）形式のみ", "画像（PNG）形式"]}, {"sec": "1.レポート作成", "q": "「レポートのプレビューを表示する」ボタンを押すと何ができるか", "a": "選択した項目でのレポート出力イメージを確認でき、確認後にさらに項目を追加したり外したりできる", "d": ["レポートが自動でメール送信される", "レポートが即座にダウンロードされる", "テンプレートが削除される"]}, {"sec": "1.レポート作成", "q": "レポートに表示する指標を選ぶ手順は", "a": "レポート項目で確認する指標を選択し、ドラッグアンドドロップまたは「＋」マークで選択済みエリアに追加する", "d": ["指標は自動で全項目が選択される", "CSVを編集して指標を追加する", "項目は選択できず固定である"]}, {"sec": "1.レポート作成", "q": "レポートのデータ集計期間で設定するものは", "a": "データの集計期間（レポートの対象期間）を選択する", "d": ["広告の配信予算", "入札価格", "ターゲティング条件"]}, {"sec": "2.オーディエンス", "q": "「オーディエンス」と「共通オーディエンス」の違いは", "a": "オーディエンスは広告主様が作成したリスト、共通オーディエンスはLINEヤフーが提供し全アカウント共通で利用できるリスト", "d": ["オーディエンスはLINEヤフー提供、共通オーディエンスは広告主作成", "どちらも広告主が作成する", "どちらもLINEヤフーが提供する"]}, {"sec": "2.オーディエンス", "q": "ディスプレイ広告（予約型）で利用できるオーディエンス・共通オーディエンスは", "a": "オーディエンス＝Yahoo! Audience Discovery・顧客データ、共通オーディエンス＝全て", "d": ["オーディエンス＝全て、共通オーディエンス＝顧客データのみ", "どちらも全て利用できる", "予約型ではオーディエンスは利用できない"]}, {"sec": "2.オーディエンス", "q": "オーディエンスリストターゲティングで複数の異なるリストを設定した場合の配信は", "a": "ORの組み合わせで配信される（いずれかに該当すれば配信）", "d": ["ANDの組み合わせで配信される（すべてに該当した場合のみ）", "最初のリストのみ有効になる", "設定できない"]}, {"sec": "2.オーディエンス", "q": "複数のリストをORの組み合わせで設定するメリットは", "a": "より広いユーザー層に配信できる", "d": ["配信対象を最も狭く絞り込める", "入札価格が自動で下がる", "審査が不要になる"]}, {"sec": "2.オーディエンス", "q": "オーディエンスリスト「①広告アクションユーザー」とは", "a": "指定した広告に対してアクション（クリック・コンバージョン・動画視聴のいずれか）を行ったユーザーを蓄積したリスト", "d": ["広告主のサイトを訪問した全ユーザーのリスト", "LINEヤフーが提供する共通リスト", "アプリをインストールしたユーザーのリスト"]}, {"sec": "2.オーディエンス", "q": "オーディエンスリスト「⑦ビジネスマネージャー」とは", "a": "LINE公式アカウントおよびLINE広告のオーディエンスデータを格納するためのオーディエンスリスト", "d": ["広告アクションを起こしたユーザーのリスト", "Yahoo!検索キーワードのリスト", "アプリイベントのリスト"]}, {"sec": "2.オーディエンス", "q": "ビジネスマネージャーのオーディエンスリストを利用する際に遵守が必要なものは", "a": "「広告データ利用基準」を遵守する必要がある", "d": ["特に基準はなく自由に利用できる", "プレミアムIDの購入が必要", "認証済アカウントであることが必要"]}, {"sec": "2.オーディエンス", "q": "オーディエンスリストターゲティングを活用する狙いは", "a": "特定の条件に合うユーザー層に配信を最適化し、効果を高めること", "d": ["全ユーザーに均等配信すること", "配信対象を絞らないこと", "入札価格を一律にすること"]}, {"sec": "2.オーディエンス", "q": "ディスプレイ広告（運用型）で利用できるオーディエンス・共通オーディエンスは", "a": "どちらも「全て」利用できる", "d": ["オーディエンスのみ利用できる", "共通オーディエンスのみ利用できる", "どちらも利用できない"]}, {"sec": "3.サイトリターゲティング", "q": "サイトリターゲティングで設置が必要なタグは", "a": "サイトジェネラルタグ・サイトリターゲティングタグ", "d": ["コンバージョン測定タグのみ", "アプリ計測タグ", "検索連動タグ"]}, {"sec": "3.サイトリターゲティング", "q": "サイトリターゲティングタグを設置する位置は", "a": "ウェブサイト内の全ページの</body>タグ（終了タグ）の直前", "d": ["<head>タグの直後", "コンバージョンページの<title>内", "</html>タグの直後"]}, {"sec": "3.サイトリターゲティング", "q": "サイトジェネラルタグの特徴は", "a": "各種ブラウザー環境などの影響を受けにくいフォーマットで、精度の高いサイトリターゲティング設定が可能。サイトリターゲティングタグ・コンバージョン測定タグ・コンバージョン測定補完機能タグを統合的に管理し実行させる役割を持つ", "d": ["特定のブラウザーでしか動作しない", "コンバージョンの計測はできない", "設置しなくてもよい補助的なタグ"]}, {"sec": "3.サイトリターゲティング", "q": "サイトリターゲティングの「サイトリターゲティングタグ」の役割は", "a": "ウェブサイトに設置することで、過去にサイトを訪問したインターネットユーザーに対して広告を配信できる", "d": ["新規ユーザーにのみ広告を配信する", "友だちにメッセージを配信する", "検索結果に広告を表示する"]}, {"sec": "3.サイトリターゲティング", "q": "サイトジェネラルタグを設置する位置は", "a": "ウェブサイト内の全ページの</body>タグ（終了タグ）の直前", "d": ["<head>タグの直後のみ", "トップページのみ", "コンバージョンページの本文中"]}, {"sec": "3.サイトリターゲティング", "q": "サイトジェネラルタグが統合的に管理・実行する対象は", "a": "サイトリターゲティングタグ、コンバージョン測定タグ、コンバージョン測定補完機能タグ", "d": ["検索連動タグとアプリ計測タグ", "友だち追加タグとメッセージタグ", "広告表示アセットと構造化スニペット"]}, {"sec": "4.カスタムラベル", "q": "カスタムラベルは1つのページに設置したサイトリターゲティングタグ1個につき、いくつまで設定できるか", "a": "1個まで", "d": ["3個まで", "10個まで", "無制限"]}, {"sec": "4.カスタムラベル", "q": "カスタムラベルに使用できる文字数は", "a": "10文字以内", "d": ["20文字以内", "50文字以内", "制限なし"]}, {"sec": "4.カスタムラベル", "q": "カスタムラベルに使用できる文字は", "a": "半角英数記号のみ", "d": ["全角の日本語も使用できる", "ひらがな・カタカナのみ", "絵文字も使用できる"]}, {"sec": "4.カスタムラベル", "q": "カスタムラベルの設定例（旅行サイト）でできることは", "a": "各ページを「国内旅行」「海外旅行」にグルーピングし、訪問ユーザーを分類して広告の出し分けができる", "d": ["訪問ユーザーの個人情報を取得できる", "ページの表示速度を上げられる", "広告費を自動で削減できる"]}, {"sec": "4.カスタムラベル", "q": "カスタムラベル名の設定について正しいものは", "a": "設定するカスタムラベル名は任意である", "d": ["カスタムラベル名は必須で固定されている", "LINEヤフーが自動で命名する", "数字のみしか使えない"]}, {"sec": "4.カスタムラベル", "q": "カスタムラベルを使ってターゲティング配信する際にできることは", "a": "分類した情報（例：国内旅行用広告/海外旅行用広告）をもとに広告の出し分けができる", "d": ["全ユーザーに同じ広告を配信する", "ユーザーの個人情報を取得する", "審査を省略する"]}, {"sec": "5.データ有効期間", "q": "データの有効期間と蓄積の設定対象となるオーディエンスリストは", "a": "ウェブサイト訪問ユーザー・アプリユーザー・広告アクションユーザー（データの有効期限のみ）", "d": ["共通オーディエンスのみ", "ビジネスマネージャーのリストのみ", "顧客データのみ"]}, {"sec": "5.データ有効期間", "q": "ウェブサイト訪問ユーザー・アプリユーザーのオーディエンスリストは、いつデータの有効期間・蓄積を設定できるか", "a": "作成時にも設定が可能", "d": ["作成後しか設定できない", "設定はできない", "配信開始後のみ設定できる"]}, {"sec": "5.データ有効期間", "q": "広告アクションユーザーのオーディエンスリストで設定できるのは", "a": "データの有効期限のみ", "d": ["データの蓄積条件のみ", "有効期限と蓄積条件の両方", "設定項目はない"]}, {"sec": "6.過去の訪問者", "q": "「過去の訪問者の設定」はいつ設定できるか", "a": "オーディエンスリストの新規作成時のみ設定可能で、作成後は編集できない", "d": ["作成後にいつでも編集できる", "配信中のみ編集できる", "設定する必要はない"]}, {"sec": "6.過去の訪問者", "q": "「過去の訪問者の設定」を利用するために事前に必要なものは", "a": "オーディエンスリスト作成以前に、広告主サイトへのサイトリターゲティングタグの設置や、アプリイベントの設定が必要", "d": ["プレミアムIDの購入", "認証済アカウントへの変更", "特に事前準備は不要"]}, {"sec": "6.過去の訪問者", "q": "格納するデータによって「過去の訪問者の設定」で必要な事前設定が異なる理由は", "a": "オーディエンスリストに格納するデータ（ウェブ訪問・アプリイベントなど）によって、必要なタグやイベント設定が異なるため", "d": ["すべて同じ設定で済むため", "事前設定は不要なため", "プランによって異なるため"]}, {"sec": "7.実績値確認", "q": "オーディエンスリストの実績値（インプレッション数・クリック数・コンバージョン数など）を確認する方法は", "a": "広告管理ツールの一覧画面、またはパフォーマンスレポート作成時に「基本項目」の「設定項目：基本」から「オーディエンスリスト名」「オーディエンスリストID」を指定する", "d": ["広告プレビューツールで確認する", "操作履歴で確認する", "審査状況の画面で確認する"]}, {"sec": "7.実績値確認", "q": "1人のユーザーが複数のオーディエンスリストにマッチした場合、実績値はどう加算されるか", "a": "最大の入札価格調整率が設定されているリストのみに実績値が加算される", "d": ["すべてのリストに均等に加算される", "最初に作成したリストに加算される", "加算されない"]}, {"sec": "7.実績値確認", "q": "オーディエンスリストの実績値の合計が他のレポートと一致しない場合がある理由は", "a": "最大の入札価格調整率が複数のリストに設定されている場合、それぞれに実績値が加算されるため", "d": ["実績値は常に2倍にカウントされるため", "集計タイミングが必ずずれるため", "審査前データが含まれるため"]}, {"sec": "7.実績値確認", "q": "オーディエンスリストの実績値で確認できる指標の例は", "a": "インプレッション数、クリック数、コンバージョン数など", "d": ["友だちの個人情報", "ユーザーの検索履歴", "ユーザーの位置情報"]}, {"sec": "8.動的ディスプレイ広告", "q": "動的ディスプレイ広告とは", "a": "ウェブサイトを訪 不要になる", "クリック単価が必ず下がる", "掲載順位が固定される"]}, {"sec": "17.レスポンシブ作成", "q": "レスポンシブディスプレイ広告のメディアの形式で選択するものは", "a": "画像を選択する", "d": ["テキストのみを選択する", "電話番号を選択する", "住所を選択する"]}, {"sec": "18.IMP増(入札)", "q": "インプレッション数を増やすために入札価格を上げると何が起きるか", "a": "オークションランクの向上に直結し、広告の表示回数が増加する可能性がある", "d": ["必ず審査が早く通る", "コンバージョン率が必ず上がる", "予算が自動で増える"]}, {"sec": "18.IMP増(入札)", "q": "入札価格調整機能で「引き下げ率」を設定している場合の注意点は", "a": "設定した引き下げ率が適用されるため、入札価格が低いときは見直しを検討する", "d": ["引き下げ率は入札価格に影響しない", "引き下げ率を設定すると表示が必ず増える", "引き下げ率は審査に影響する"]}, {"sec": "18.IMP増(入札)", "q": "「オークションランク」は何で構成されるか", "a": "入札価格と広告の品質", "d": ["予算と配信期間", "クリック数と表示回数", "友だち数とフォロワー数"]}, {"sec": "18.IMP増(入札)", "q": "入札価格を上げてもインプレッションが増えにくい場合に見直すべき点は", "a": "入札価格調整機能の「引き下げ率」が設定されていないか確認する", "d": ["広告文の文字数を増やす", "友だちを増やす", "アカウントを作り直す"]}, {"sec": "19.CVR改善(入札)", "q": "クリック率・コンバージョン率・動画再生率を上げるために「2倍以上のサイズの画像」を入稿するメリットは", "a": "従来のサイズで表示される可能性がある「画像の周囲の余白」がない状態で表示でき、デバイスのサイズに合わせて画像が伸縮しても綺麗な状態を保てる", "d": ["画像のファイルサイズを小さくできる", "審査が不要になる", "入札価格が自動で下がる"]}, {"sec": "19.CVR改善(入札)", "q": "入札価格を上げることでクリックやコンバージョン、動画再生につながりやすくなる理由は", "a": "オークションランクが向上しやすくなり、広告掲載面に掲載される可能性が高まるため", "d": ["広告の品質が自動で上がるため", "審査が省略されるため", "予算が自動で増えるため"]}, {"sec": "19.CVR改善(入札)", "q": "2倍以上のサイズの画像を入稿する際の注意点は", "a": "入稿規定にある最小ピクセルサイズの2倍以上の画像サイズを入稿できる（一部のサイズは除く）", "d": ["どんなサイズでも必ず入稿できる", "2倍以上は入稿できない", "サイズは関係ない"]}, {"sec": "20.目的・目標", "q": "「決められた予算を極力使い切り、可能な限りクリックを集めたい」場合のKPIの例は", "a": "予算の満額消化、クリック単価（CPC）", "d": ["コンバージョン単価（CPA）、ROAS", "インプレッションシェア、友だち数", "開封率、ブロック率"]}, {"sec": "20.目的・目標", "q": "「決められた予算で可能な限りコンバージョンを獲得したい」場合のKPIの例は", "a": "予算の満額消化、コンバージョン単価（CPA）", "d": ["クリック単価（CPC）、クリック数", "ROAS、コンバージョン数", "インプレッション数、CTR"]}, {"sec": "20.目的・目標", "q": "「一定以上のROAS（または一定以下のCPA）であれば予算に制限を設けずコンバージョンを最大化したい」場合のKPIの例は", "a": "CPAまたはROAS、コンバージョン数", "d": ["予算の満額消化、CPC", "インプレッションシェア、CTR", "友だち数、開封率"]}, {"sec": "20.目的・目標", "q": "「ROAS」とは何の略か", "a": "広告の費用対効果のこと。特定の広告に投資した広告費用から発生した売上額のこと", "d": ["コンバージョン1件あたりの単価", "1クリックあたりの単価", "広告の表示回数"]}, {"sec": "20.目的・目標", "q": "広告掲載の目的・目標を設定する意義は", "a": "目的に応じたKPIを定め、改善の内容と優先順位を明確にするため", "d": ["予算を必ず使い切るため", "常にクリックを最大化するため", "目的は結果に影響しないため"]}, {"sec": "21.改善提案", "q": "改善提案を行うにあたって重要な4つの要素は", "a": "「改善のロジック」「メリットとデメリット」「準備作業とスケジュール」「実施後の効果検証」", "d": ["予算・期間・人員・場所", "商品・価格・流通・販促", "認知・興味・比較・購入"]}, {"sec": "21.改善提案", "q": "メール本文で気軽に提案してよいケースは", "a": "メリットが明らかな場合、運用者以外に工数がかからない場合、以前に実施していた場合、関係者が理解している場合", "d": ["改善ロジックが複雑な場合", "デメリットが重大な場合", "関係者が多い場合"]}, {"sec": "21.改善提案", "q": "資料にまとめた方が提案が通りやすいケースは", "a": "改善ロジックが複雑な場合、デメリットが重大な場合、運用者以外の工数が大きい場合、関係者が多い場合", "d": ["メリットが明らかな場合", "以前に実施していた場合", "関係者が理解している場合"]}, {"sec": "21.改善提案", "q": "デメリットやリスクが想定される場合、または自分以外に工数が発生する場合に必要なことは", "a": "丁寧な説明が必要", "d": ["説明は省略してよい", "提案自体を取りやめる", "口頭だけで済ませる"]}, {"sec": "21.改善提案", "q": "改善提案で「実施後の効果検証」を含める意義は", "a": "施策実施後に効果を測定し、次の改善につなげるため", "d": ["効果検証は不要だから", "提案を通すための形式だけだから", "予算を増やすため"]}];
DATA.forEach((d,i)=>d.id=i);
let store={};
try{store=JSON.parse(localStorage.getItem('lineqz_disp_adv')||'{}');}catch(e){}
function save(){try{localStorage.setItem('lineqz_disp_adv',JSON.stringify(store));}catch(e){}}
function savePos(id){try{localStorage.setItem('lineqz_disp_adv_pos',String(id));}catch(e){}}
function loadPos(){try{const v=localStorage.getItem('lineqz_disp_adv_pos');return v==null?null:+v;}catch(e){return null;}}
const $=s=>document.querySelector(s);
let mode='all', sec='ALL', list=[], idx=0;
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const secs=[...new Set(DATA.map(d=>d.sec))];
$('#secSel').innerHTML='<option value="ALL">すべてのセクション ('+DATA.length+'問)</option>'+
  secs.map(s=>'<option value="'+s+'">'+s+' ('+DATA.filter(d=>d.sec===s).length+'問)</option>').join('');
function makeOptions(card){
  if(card._opts) return card._opts;
  const st=store[card.id];
  if(st && st.opts){ card._opts=st.opts; return card._opts; }
  card._opts=shuffleArr([card.a, ...card.d]);
  return card._opts;
}
function refreshResumeBtn(){
  const has=loadPos()!==null;
  const b=$('#resume');
  b.disabled=!has;
  b.textContent=has?'▶ 前回の続きから再開':'▶ 続きから（まだ記録がありません）';
}
function build(){
  let base=DATA.filter(d=> sec==='ALL'||d.sec===sec);
  if(mode==='weak') base=base.filter(d=>store[d.id]&&store[d.id].r==='weak');
  list=base; idx=0; render();
}
function render(){
  const tot=list.length;
  const known=list.filter(d=>store[d.id]&&store[d.id].r==='known').length;
  const weak=list.filter(d=>store[d.id]&&store[d.id].r==='weak').length;
  const done=known+weak;
  $('#ptot').textContent=tot;$('#pknown').textContent=known;$('#pweak').textContent=weak;
  $('#pdone').textContent=done;
  $('#prate').textContent=done?Math.round(known/done*100)+'%':'-';
  $('#prog').style.width=tot?(done/tot*100)+'%':'0%';
  const area=$('#cardArea');
  if(tot===0){area.innerHTML='<div class="card"><div class="done"><h2>🎉</h2><p>このカテゴリに表示する問題がありません。<br>モードやセクションを切り替えてください。</p></div></div>';refreshResumeBtn();return;}
  if(idx>=tot)idx=tot-1;if(idx<0)idx=0;
  const d=list[idx];
  savePos(d.id);
  refreshResumeBtn();
  const opts=makeOptions(d);
  const st=store[d.id];
  const answered=!!(st && st.sel!==undefined && st.sel!==null);
  const selIdx=answered?opts.indexOf(st.sel):-1;
  let html='<div class="card"><div class="tagrow"><span class="tag">'+d.sec+'</span><span class="num">'+(idx+1)+' / '+tot+'</span></div>'+
    '<div class="qlabel">Q. 次の問いの正しい答えを選んでください</div>'+
    '<div class="qtext">'+d.q+'</div>';
  opts.forEach((o,i)=>{
    const isCorrect=o===d.a;
    let cls='opt';let mark='';
    if(answered){cls+=' disabled';
      if(isCorrect){cls+=' correct';mark='<span class="mark" style="color:var(--green)">○</span>';}
      else if(i===selIdx){cls+=' wrong';mark='<span class="mark" style="color:var(--red)">×</span>';}
    }
    html+='<label class="'+cls+'" data-i="'+i+'"><input type="checkbox" '+(i===selIdx?'checked':'')+' '+(answered?'disabled':'')+'><span class="txt">'+o+'</span>'+mark+'</label>';
  });
  if(answered){
    const ok=opts[selIdx]===d.a;
    html+='<div class="feedback '+(ok?'ok':'ng')+'">'+(ok?'○ 正解！':'× 不正解')+'</div>';
  }else{html+='<div class="feedback"></div>';}
  html+='</div>';
  area.innerHTML=html;
  if(!answered){
    area.querySelectorAll('.opt').forEach(el=>{
      el.onclick=ev=>{ev.preventDefault();const i=+el.dataset.i;
        store[d.id]={r:(opts[i]===d.a)?'known':'weak', sel:opts[i], opts:opts};
        save();render();window.scrollTo({top:0,behavior:'smooth'});};
    });
  }
}
$('#next').onclick=()=>{idx=(idx+1)%Math.max(list.length,1);render();window.scrollTo(0,0);};
$('#prev').onclick=()=>{idx=(idx-1+list.length)%Math.max(list.length,1);render();window.scrollTo(0,0);};
$('#shuffle').onclick=()=>{shuffleArr(list);idx=0;render();};
$('#resume').onclick=()=>{
  mode='all';sec='ALL';
  $('#mAll').classList.add('on');$('#mWeak').classList.remove('on');$('#secSel').value='ALL';
  list=DATA.slice();
  const li=loadPos();
  let start=0;
  if(li!=null){const p=list.findIndex(d=>d.id===li); if(p>=0) start=Math.min(p+1,list.length-1);}
  idx=start; render(); window.scrollTo(0,0);
};
$('#reset').onclick=()=>{if(confirm('成績（正解・不正解）と続きの位置をすべてリセットしますか？')){store={};DATA.forEach(d=>{delete d._opts;});save();try{localStorage.removeItem('lineqz_disp_adv_pos');}catch(e){}build();}};
$('#secSel').onchange=e=>{sec=e.target.value;build();};
$('#mAll').onclick=()=>{mode='all';$('#mAll').classList.add('on');$('#mWeak').classList.remove('on');build();};
$('#mWeak').onclick=()=>{mode='weak';$('#mWeak').classList.add('on');$('#mAll').classList.remove('on');build();};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')$('#next').click();else if(e.key==='ArrowLeft')$('#prev').click();});
build();
</script>
</body>
