<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LINE Advance">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a52">
<meta name="format-detection" content="telephone=no">
<title>LINE公式アカウント Advance 4択クイズ</title>
<style>
:root{--green:#06C755;--navy:#0a0a52;--bg:#f4f6f8;--card:#fff;--gray:#8a93a0;--line:#e3e7ec;--red:#e23b3b;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg);color:#1b1f24;padding-bottom:env(safe-area-inset-bottom);}
header{background:var(--navy);color:#fff;padding:calc(12px + env(safe-area-inset-top)) 14px 12px;display:flex;align-items:center;gap:10px;}
header .dot{width:22px;height:22px;border-radius:6px;background:var(--green);display:inline-block;flex:none;}
header h1{font-size:15px;margin:0;font-weight:700;flex:1;line-height:1.3;}
.backbtn{flex:none;display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:10px;padding:7px 11px;font-size:13px;font-weight:700;text-decoration:none;cursor:pointer;white-space:nowrap;}
.backbtn:active{transform:scale(.96);}
.wrap{max-width:680px;margin:0 auto;padding:14px;}
.resumeRow{margin-bottom:10px;}
#resume{width:100%;background:var(--green);color:#fff;border:none;font-weight:700;padding:13px;font-size:15px;border-radius:12px;}
#resume:disabled{background:#c7ccd2;cursor:default;}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;}
select,button{font-family:inherit;font-size:14px;border-radius:10px;border:1px solid var(--line);background:#fff;padding:9px 12px;cursor:pointer;}
select{flex:1;min-width:140px;}
button:active{transform:scale(.97);}
.bar{height:8px;background:#e3e7ec;border-radius:99px;overflow:hidden;margin:6px 0 4px;}
.bar > i{display:block;height:100%;background:var(--green);width:0;transition:width .3s;}
.stat{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-bottom:12px;}
.stat b{color:#1b1f24;}
.card{background:var(--card);border-radius:18px;box-shadow:0 4px 18px rgba(10,10,40,.08);padding:20px 18px 18px;position:relative;}
.tagrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.tag{font-size:11px;font-weight:700;color:var(--green);background:#eafaf0;padding:4px 10px;border-radius:99px;}
.num{font-size:12px;color:var(--gray);}
.qlabel{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--gray);margin-bottom:8px;}
.qtext{font-size:19px;line-height:1.6;font-weight:700;margin-bottom:16px;}
.opt{display:flex;align-items:flex-start;gap:10px;border:2px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer;background:#fff;transition:.12s;}
.opt:hover{border-color:#cfd6df;}
.opt input{width:20px;height:20px;margin-top:1px;accent-color:var(--navy);flex:none;}
.opt .txt{font-size:15px;line-height:1.6;flex:1;}
.opt .mark{font-size:22px;font-weight:800;line-height:1;flex:none;width:24px;text-align:center;}
.opt.correct{border-color:var(--green);background:#eafaf0;}
.opt.wrong{border-color:var(--red);background:#fdeaea;}
.opt.disabled{cursor:default;}
.feedback{text-align:center;font-size:17px;font-weight:800;margin:6px 0 2px;min-height:24px;}
.feedback.ok{color:var(--green);}
.feedback.ng{color:var(--red);}
.nav{display:flex;gap:10px;margin-top:14px;}
.nav button{flex:1;}
.nav .primary{background:var(--green);color:#fff;border:none;font-weight:700;}
.modeRow{display:flex;gap:8px;margin-bottom:10px;}
.modeRow button{flex:1;font-size:13px;padding:8px;}
.modeRow button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.done{text-align:center;padding:46px 20px;}
.foot{text-align:center;font-size:11px;color:var(--gray);margin:18px 0;}
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>LINE公式アカウント Advance 4択クイズ</h1>
  <a class="backbtn" href="../">← メニュー</a>
</header>
<div class="wrap">
  <div class="resumeRow"><button id="resume">▶ 前回の続きから再開</button></div>
  <div class="modeRow">
    <button id="mAll" class="on">全問題</button>
    <button id="mWeak">間違えた問題だけ</button>
  </div>
  <div class="controls">
    <select id="secSel"></select>
    <button id="shuffle">🔀 シャッフル</button>
    <button id="reset">↺ 成績リセット</button>
  </div>
  <div class="bar"><i id="prog"></i></div>
  <div class="stat"><span>解答 <b id="pdone">0</b> / <b id="ptot">0</b></span><span>正解 <b id="pknown">0</b>　不正解 <b id="pweak">0</b>　正答率 <b id="prate">-</b></span></div>
  <div id="cardArea"></div>
  <div class="nav">
    <button id="prev">← 前へ</button>
    <button class="primary" id="next">次へ →</button>
  </div>
  <p class="foot">選択肢のチェックボックスを選ぶと自動で答え合わせ（○＝正解／×＝不正解）。「メニュー」を押しても成績・進捗は保存され、「▶ 前回の続きから再開」で続きから再開できます。<br>LINEヤフーマーケティングキャンパス「LINE公式アカウント Advanced」教材より作成</p>
</div>
<script>
const DATA = [{"sec": "1.広告・友だち獲得", "q": "友だち追加メニューを「単一施策による友だち追加数」で分類したとき、最も獲得ボリュームが大きいのは", "a": "オーガニック流入（300〜500万人規模）", "d": ["ダイレクトスタンプ（1,000人〜規模）", "CPDスタンプ（1,000人〜規模）", "スポンサードミッションスタンプ（10万人規模）"]}, {"sec": "1.広告・友だち獲得", "q": "友だち追加施策で「ブロック率が比較的高い」傾向にあるのは", "a": "LINEポイントAD", "d": ["オーガニック流入", "ダイレクトスタンプ", "スポンサードスタンプ"]}, {"sec": "1.広告・友だち獲得", "q": "ミッションスタンプの実施目的は", "a": "UID（LINEのユーザー識別子）と顧客情報の連携促進。本人認証できる会員IDとの紐付けや、新規会員登録・資料/サンプル請求、ユーザー属性取得などの用途で実施できる", "d": ["購買・コメント・画像投稿を促すこと", "会員番号のみを入力させて本人確認すること", "友だちに無料スタンプを配って認知を広げること"]}, {"sec": "1.広告・友だち獲得", "q": "ミッションスタンプを実施できる適用アカウントは", "a": "LINE公式アカウント（API利用）", "d": ["LINE公式アカウント（APIを利用しないもの）", "個人のLINEアカウント", "未認証アカウントのみ"]}, {"sec": "1.広告・友だち獲得", "q": "「LINE広告（友だち追加）」を活用した友だち獲得方法の狙いは", "a": "メッセージクリックユーザーに近いユーザーをLINE公式アカウントへ集める（メッセージ内容に興味があるユーザーに近い層へアプローチ）", "d": ["既存の友だちにもう一度メッセージを送り再来店を促す", "友だち以外の全ユーザーへ無差別に広告を配信する", "ブロックしたユーザーを再度友だちに戻す"]}, {"sec": "2.LINEで応募", "q": "「LINEで応募」とは", "a": "LINEを活用した店頭販促ソリューションをパッケージ化したもの。オープンキャンペーンやポイントインセンティブなど様々なプランがある", "d": ["友だち一人ひとりと個別チャットをする機能", "アンケートで満足度を測るNPS調査の仕組み", "ステップ配信を自動化する機能"]}, {"sec": "2.LINEで応募", "q": "LINEオープンキャンペーン（アンケート型）の特徴は", "a": "アンケートの回答者全員がLINEポイントをもらえるメニュー。商品やブランド認知が拡大でき、効率的な友だち追加が期待できる", "d": ["抽選で当選した一部の回答者だけがポイントをもらえる", "友だち追加した人だけが回答できる有料アンケート", "回答するとクーポンが必ず当たる仕組み"]}, {"sec": "2.LINEで応募", "q": "LINEオープンキャンペーン（アンケート型）を利用できるアカウントの条件は", "a": "LINE公式アカウントかつ、LINEのMessaging APIに対応しているアカウントのみ", "d": ["すべてのLINE公式アカウント", "未認証アカウントを含むすべてのアカウント", "プレミアムIDを取得しているアカウントのみ"]}, {"sec": "2.LINEで応募", "q": "LINEポイントADとは", "a": "「LINEポイント」のインセンティブをフックに、ユーザー獲得やサービス認知の向上、友だち増加を促進する施策。LINE公式アカウントやLINE広告とのデータ連携に対応している", "d": ["LINEポイントを現金に交換できるサービス", "LINE公式アカウントの月額料金をポイントで支払う仕組み", "友だちにポイントを直接送金できる機能"]}, {"sec": "3.運用戦略", "q": "アカウント運用で重要な「2W1H」の3要素は", "a": "WHO（ターゲティングセグメント）・WHAT（訴求内容）・HOW（機能）", "d": ["WHY（目的）・WHERE（場所）・HOW（手段）", "WHO（誰が）・WHEN（いつ）・WHERE（どこで）", "PLAN・DO・CHECK"]}, {"sec": "3.運用戦略", "q": "2W1HのWHO（ターゲティングセグメント）の例は", "a": "性別・年代・居住地・開封率・クリック傾向 など", "d": ["キャンペーン・クーポン・新商品・人気商品", "リッチメッセージ・カードタイプメッセージ・リッチメニュー", "認知・興味・獲得・リテンション"]}, {"sec": "3.運用戦略", "q": "2W1HのHOW（機能）の例は", "a": "リッチメッセージ・カードタイプメッセージ・リッチメニュー など", "d": ["性別・年代・居住地などの属性", "キャンペーン・クーポン・新商品などの訴求内容", "目的・KPIの設定"]}, {"sec": "3.運用戦略", "q": "オーディエンス選択のSTEP1で行うことは", "a": "効果が高いオーディエンスに合うコンテンツ・クリエイティブを探す（セグメントを分けてA/Bテスト）", "d": ["効果が高い配信時間を見つける", "効果が高い組み合わせの要素を深掘りする", "友だちの数をできるだけ増やす"]}, {"sec": "3.運用戦略", "q": "オーディエンス選択のSTEP2で行うことは", "a": "効果が高い配信時間を見つける（配信時間を変えてA/Bテストを行う）", "d": ["効果が高いコンテンツ・クリエイティブを探す", "友だち追加広告を出稿する", "クーポンを大量に配布する"]}, {"sec": "4.効果計測", "q": "企業アカウントフォロワー調査でできることは", "a": "有償のLINEリサーチで、アカウントフォロワー（ターゲットリーチ）と非フォロワー（非友だち）にアンケートを実施し、ブランドの認知状況・好意度・特徴認知などの違いを比較できる", "d": ["友だちの電話番号や住所を取得できる", "友だちのトーク内容を閲覧できる", "ブロックしたユーザーの理由を自動で分析できる"]}, {"sec": "4.効果計測", "q": "ベースコードとコンバージョンコードの設置場所の違いは", "a": "ベースコードは全ページの<head>内に設置し、コンバージョンコードは計測したいページのベースコード直下に設置する", "d": ["ベースコードは計測ページのみ、コンバージョンコードは全ページに設置する", "どちらも<body>の最下部に設置する", "ベースコードは<head>、コンバージョンコードは別ドメインに設置する"]}, {"sec": "4.効果計測", "q": "ウェブトラフィックオーディエンスとは", "a": "LINE Tagを使い、URLやイベントを指定してオーディエンスを作成できる機能。任意のCVページに訪れた「友だち」をオーディエンス化できる", "d": ["友だちの属性（性別・年齢）だけで絞り込む機能", "過去に配信したメッセージを再配信する機能", "アンケート回答者を自動で友だち追加する機能"]}, {"sec": "4.効果計測", "q": "ウェブトラフィックオーディエンスの有効期間は", "a": "180日以内で設定できる", "d": ["30日以内で設定できる", "90日以内で設定できる", "365日以内で設定できる"]}, {"sec": "4.効果計測", "q": "カスタムイベントコードのLINE Tagでできることは", "a": "メッセージ配信での送客後、ユーザーがどこで離脱しているのか（かご落ちなど）を把握し、特定オーディエンスに狙いを定めて再配信できる", "d": ["全ページのアクセス数だけを合計して表示する", "友だちの個人情報を直接ダウンロードする", "メッセージの配信予約を自動で行う"]}, {"sec": "5.API・拡張機能", "q": "Messaging APIでできることは", "a": "友だちになっているユーザーに対し、パーソナライズされたメッセージの送信や双方向のコミュニケーションが行える", "d": ["友だち以外の全ユーザーに一斉送信できる", "管理画面なしで広告を自動出稿できる", "他社アカウントのデータを閲覧できる"]}, {"sec": "5.API・拡張機能", "q": "Messaging APIの応答メッセージ（Reply）とプッシュメッセージ（Push）の違いは", "a": "Replyはユーザーの個別のアクションに対して返信でき、Pushはパーソナライズされたメッセージを能動的に送信できる", "d": ["Replyは有料、Pushは無料という料金の違い", "Replyは画像のみ、Pushはテキストのみ送れる", "どちらも友だち追加時にしか使えない"]}, {"sec": "5.API・拡張機能", "q": "Messaging APIを利用する際に使えるものは", "a": "開発者向けポータルサイト「LINE Developers」。認定パートナー「Technology Partner」へ相談することも可能", "d": ["店頭の専用端末のみ", "Yahoo!広告の管理画面", "LINEアプリの設定画面のみ"]}, {"sec": "5.API・拡張機能", "q": "UID（ユーザー識別子）とは", "a": "個々のLINE公式アカウントごとに割り振られる、ユーザーを識別するID。API経由でのアクションを行うにはUIDを指定する必要がある", "d": ["全LINE公式アカウントで共通のユーザーIDのこと", "ユーザーが自分で設定するLINEのID", "管理者を識別するための管理IDのこと"]}, {"sec": "5.API・拡張機能", "q": "LINEログインを組み込めるものは", "a": "ウェブアプリ、iOSアプリ、Androidアプリ、またはUnityゲーム", "d": ["LINE公式アカウントの管理画面のみ", "Yahoo! JAPANのサービスのみ", "紙のDMやチラシ"]}, {"sec": "5.API・拡張機能", "q": "Flex Messageとは", "a": "自由なレイアウトのメッセージ。文字のサイズや色を変更したり、任意の画像を組み込むなどのレイアウトが可能", "d": ["自動再生される動画メッセージ", "友だち追加時に自動で送るあいさつメッセージ", "アンケートを送るリサーチ機能"]}, {"sec": "5.API・拡張機能", "q": "LINE Front-end Frameworkとは", "a": "LINE公式アカウント内でウェブブラウザを立ち上げ、アクションを行えるようにする機能。離脱リスクの軽減や遷移トラッキング、取得情報を活用したアカウント設計が可能になる", "d": ["メッセージを自由なレイアウトで作る機能", "友だちの電話番号を取得する機能", "広告を自動で出稿するフレームワーク"]}, {"sec": "5.API・拡張機能", "q": "LINEチャットPlusとLINEコールPlusの起点の違いは", "a": "LINEチャットPlusはチャットを起点としたお問い合わせに、LINEコールPlusは電話を起点としたお問い合わせに対応するカスタマーサービス", "d": ["チャットPlusは電話起点、コールPlusはチャット起点", "どちらもメール起点で対応する", "チャットPlusは有料、コールPlusは無料という違い"]}, {"sec": "5.API・拡張機能", "q": "Mark-as-Read APIとは", "a": "指定されたユーザーから送信されたメッセージ全てに既読表示をつけられるAPI", "d": ["メッセージを未読に戻すAPI", "送信したメッセージを取り消すAPI", "ユーザーをブロックするAPI"]}, {"sec": "5.API・拡張機能", "q": "API利用にあたっての禁止事項に含まれるものは", "a": "LINEのプラットフォームへの大量リクエストの禁止、負荷テストの禁止、同一ユーザーへの大量送信の禁止、存在しないUIDへのリクエストの禁止", "d": ["パーソナライズされたメッセージの送信の禁止", "応答メッセージの利用の禁止", "オーディエンス作成の禁止"]}, {"sec": "5.API・拡張機能", "q": "LINEミニアプリとは", "a": "ライフスタイルにおけるさまざまなニーズに応えるサービスを、LINE上で提供できるウェブアプリケーション。ダウンロード不要でアクセスでき、LINEから無料でメッセージ通知、LINE公式アカウントへの友だち追加もできる", "d": ["スマホにダウンロードして使う専用アプリ", "拡張機能を購入できるプラットフォーム", "友だちと通話できる無料電話サービス"]}, {"sec": "5.API・拡張機能", "q": "LINEマーケットプレイスとは", "a": "LINE公式アカウントの「拡張機能」や「運用サポートパック」を検索・購入できるプラットフォーム。開発不要で、低額（月額1万円以内）からでも導入できる", "d": ["LINEポイントを売買できる取引所", "ライフスタイルサービスを提供するミニアプリ", "友だちを売買できる広告サービス"]}, {"sec": "6.API活用事例", "q": "APIの活用事例で示される3つの「つながる」カテゴリは", "a": "便利につながる・楽しくつながる・お得につながる", "d": ["速くつながる・安くつながる・広くつながる", "認知・興味・購入につながる", "集客・接客・追客につながる"]}, {"sec": "6.API活用事例", "q": "LINE通知メッセージの特徴は", "a": "LINEヤフー社が提供し、荷物のお届け連絡や購買完了・支払情報など、ユーザーが知りたい情報を通知できる。電話番号を利用する", "d": ["友だち全員に一斉送信する広告メッセージ", "アンケート回答者にポイントを配るメニュー", "ユーザーが自分で設定する通知音の機能"]}, {"sec": "6.API活用事例", "q": "「楽しくつながる」事例として挙げられるのは", "a": "クイズや診断などのコンテンツをMessaging APIで作成したり、自社キャラクター/他社IPとコラボした会話できるbotを実装する", "d": ["荷物のお届け連絡を通知する", "レシート送信で特典を付与する", "バーコード会員証を発行する"]}, {"sec": "6.API活用事例", "q": "「お得につながる」スポット施策の例は", "a": "「友だち」がトークルームへレシートの写真を送信することで、特典を付与する還元キャンペーンを企画する", "d": ["クイズや診断コンテンツで楽しませる", "荷物のお届け連絡を通知する", "ウェブブラウザを立ち上げてアクションさせる"]}, {"sec": "7.データソリューション", "q": "LINE DATA SOLUTIONの構想とは", "a": "LINE内外のデータを横断的に活用することで、ユーザーとの最適なコミュニケーションを実現する構想（データ蓄積→統合→活用→コミュニケーション）", "d": ["LINEのデータを外部に販売するサービス", "友だちの個人情報を一括ダウンロードする機能", "広告費を自動で最適化するだけのツール"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーとは", "a": "LINE内外のデータを活用したデータマーケティングを実現するための基盤となるプロダクト。横断的にデータを活用し、マーケティング効果の向上が見込める", "d": ["LINE公式アカウントを複数まとめて運用する管理アプリ", "広告を出稿する専用の管理画面", "友だちと個別にチャットする機能"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーの「組織」とは", "a": "ビジネスマネージャーを構成する単位。1企業で1組織のみ認証が可能", "d": ["管理・作成・共有できるオーディエンスやLINE Tagの総称", "接続できるLINE公式アカウントや広告アカウントの総称", "組織にアカウントを紐付けること"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーの「リソース」とは", "a": "ビジネスマネージャーで管理・作成・共有できるオーディエンスやLINE Tagなどの総称", "d": ["ビジネスマネージャーを構成する単位", "接続できるLINE公式アカウントや広告アカウントの総称", "組織にアカウントを紐付けること"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーの「接続」とは", "a": "ビジネスマネージャーの組織にアカウントを紐付けること", "d": ["オーディエンスやLINE Tagを作成すること", "1企業で1つの組織を認証すること", "リソースを他社と共有すること"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーで「今、できること」は", "a": "LINE Tag共有・作成、LINE Conversion API、オーディエンス共有・作成", "d": ["クロス分析機能", "友だちへの自動メッセージ配信", "広告の自動入札"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーで共有できるLINE内データの4プロダクトは", "a": "Talk Head View、LINEヤフー広告、LINE公式アカウント、LINE NEWS TOP AD", "d": ["LINEミニアプリ、LINEマーケットプレイス、LINEログイン、LINE Pay", "クーポン、ショップカード、リサーチ、リッチメニュー", "Messaging API、Flex Message、LINE Tag、UID"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーで利用できるLINE外データの例は", "a": "電話番号・メールアドレス・広告識別子（IDFA/AAID）などをアップロードしてオーディエンス作成に利用できる", "d": ["友だちのトーク履歴", "友だちの位置情報のリアルタイムデータ", "ユーザーのクレジットカード番号"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーで「誤解しやすいポイント」とは", "a": "管理者はリソースの共有先を設定できるが、LINE公式アカウントやLINE広告のアカウントにログインして閲覧・編集・運用・配信ができるわけではない", "d": ["管理者はすべてのアカウントに自由にログインして配信できる", "リソースは一切共有できない", "1人の管理者しか登録できない"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーの利用開始（開設〜配信利用開始）までの所要日数の目安は", "a": "5営業日程度（Step5の審査に5営業日程度かかる）", "d": ["即日で利用開始できる", "2週間程度かかる", "1か月程度かかる"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーで、アカウント接続時にデフォルトで共有されるリソースの範囲は", "a": "「一部のリソースのみ」が共有される。すべて共有したい場合は「組織」設定から「すべてのリソース」に変更する", "d": ["最初からすべてのリソースが共有される", "リソースは一切共有されない", "審査完了後に自動で全リソースが共有される"]}, {"sec": "7.データソリューション", "q": "ビジネスマネージャーで利用できるデータの条件は", "a": "ユーザーの許諾を取得済みの情報のみ", "d": ["すべての取得データを許諾なしで利用できる", "電話番号データのみ許諾が必要", "LINE内データのみ許諾が必要"]}];
DATA.forEach((d,i)=>d.id=i);
let store={};
try{store=JSON.parse(localStorage.getItem('lineqz_adv')||'{}');}catch(e){}
function save(){try{localStorage.setItem('lineqz_adv',JSON.stringify(store));}catch(e){}}
function savePos(id){try{localStorage.setItem('lineqz_adv_pos',String(id));}catch(e){}}
function loadPos(){try{const v=localStorage.getItem('lineqz_adv_pos');return v==null?null:+v;}catch(e){return null;}}
const $=s=>document.querySelector(s);
let mode='all', sec='ALL', list=[], idx=0;
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const secs=[...new Set(DATA.map(d=>d.sec))];
$('#secSel').innerHTML='<option value="ALL">すべてのセクション ('+DATA.length+'問)</option>'+
  secs.map(s=>'<option value="'+s+'">'+s+' ('+DATA.filter(d=>d.sec===s).length+'問)</option>').join('');
function makeOptions(card){
  if(card._opts) return card._opts;
  const st=store[card.id];
  if(st && st.opts){ card._opts=st.opts; return card._opts; }
  card._opts=shuffleArr([card.a, ...card.d]);
  return card._opts;
}
function refreshResumeBtn(){
  const has=loadPos()!==null;
  const b=$('#resume');
  b.disabled=!has;
  b.textContent=has?'▶ 前回の続きから再開':'▶ 続きから（まだ記録がありません）';
}
function build(){
  let base=DATA.filter(d=> sec==='ALL'||d.sec===sec);
  if(mode==='weak') base=base.filter(d=>store[d.id]&&store[d.id].r==='weak');
  list=base; idx=0; render();
}
function render(){
  const tot=list.length;
  const known=list.filter(d=>store[d.id]&&store[d.id].r==='known').length;
  const weak=list.filter(d=>store[d.id]&&store[d.id].r==='weak').length;
  const done=known+weak;
  $('#ptot').textContent=tot;$('#pknown').textContent=known;$('#pweak').textContent=weak;
  $('#pdone').textContent=done;
  $('#prate').textContent=done?Math.round(known/done*100)+'%':'-';
  $('#prog').style.width=tot?(done/tot*100)+'%':'0%';
  const area=$('#cardArea');
  if(tot===0){area.innerHTML='<div class="card"><div class="done"><h2>🎉</h2><p>このカテゴリに表示する問題がありません。<br>モードやセクションを切り替えてください。</p></div></div>';refreshResumeBtn();return;}
  if(idx>=tot)idx=tot-1;if(idx<0)idx=0;
  const d=list[idx];
  savePos(d.id);
  refreshResumeBtn();
  const opts=makeOptions(d);
  const st=store[d.id];
  const answered=!!(st && st.sel!==undefined && st.sel!==null);
  const selIdx=answered?opts.indexOf(st.sel):-1;
  let html='<div class="card"><div class="tagrow"><span class="tag">'+d.sec+'</span><span class="num">'+(idx+1)+' / '+tot+'</span></div>'+
    '<div class="qlabel">Q. 次の問いの正しい答えを選んでください</div>'+
    '<div class="qtext">'+d.q+'</div>';
  opts.forEach((o,i)=>{
    const isCorrect=o===d.a;
    let cls='opt';let mark='';
    if(answered){cls+=' disabled';
      if(isCorrect){cls+=' correct';mark='<span class="mark" style="color:var(--green)">○</span>';}
      else if(i===selIdx){cls+=' wrong';mark='<span class="mark" style="color:var(--red)">×</span>';}
    }
    html+='<label class="'+cls+'" data-i="'+i+'"><input type="checkbox" '+(i===selIdx?'checked':'')+' '+(answered?'disabled':'')+'><span class="txt">'+o+'</span>'+mark+'</label>';
  });
  if(answered){
    const ok=opts[selIdx]===d.a;
    html+='<div class="feedback '+(ok?'ok':'ng')+'">'+(ok?'○ 正解！':'× 不正解')+'</div>';
  }else{html+='<div class="feedback"></div>';}
  html+='</div>';
  area.innerHTML=html;
  if(!answered){
    area.querySelectorAll('.opt').forEach(el=>{
      el.onclick=ev=>{ev.preventDefault();const i=+el.dataset.i;
        store[d.id]={r:(opts[i]===d.a)?'known':'weak', sel:opts[i], opts:opts};
        save();render();window.scrollTo({top:0,behavior:'smooth'});};
    });
  }
}
$('#next').onclick=()=>{idx=(idx+1)%Math.max(list.length,1);render();window.scrollTo(0,0);};
$('#prev').onclick=()=>{idx=(idx-1+list.length)%Math.max(list.length,1);render();window.scrollTo(0,0);};
$('#shuffle').onclick=()=>{shuffleArr(list);idx=0;render();};
$('#resume').onclick=()=>{
  mode='all';sec='ALL';
  $('#mAll').classList.add('on');$('#mWeak').classList.remove('on');$('#secSel').value='ALL';
  list=DATA.slice();
  const li=loadPos();
  let start=0;
  if(li!=null){const p=list.findIndex(d=>d.id===li); if(p>=0) start=Math.min(p+1,list.length-1);}
  idx=start; render(); window.scrollTo(0,0);
};
$('#reset').onclick=()=>{if(confirm('成績（正解・不正解）と続きの位置をすべてリセットしますか？')){store={};DATA.forEach(d=>{delete d._opts;});save();try{localStorage.removeItem('lineqz_adv_pos');}catch(e){}build();}};
$('#secSel').onchange=e=>{sec=e.target.value;build();};
$('#mAll').onclick=()=>{mode='all';$('#mAll').classList.add('on');$('#mWeak').classList.remove('on');build();};
$('#mWeak').onclick=()=>{mode='weak';$('#mWeak').classList.add('on');$('#mAll').classList.remove('on');build();};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')$('#next').click();else if(e.key==='ArrowLeft')$('#prev').click();});
build();
</script>
