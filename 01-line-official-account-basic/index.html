<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LINE Basic">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a52">
<meta name="format-detection" content="telephone=no">
<title>LINE公式アカウント Basic 4択クイズ</title>
<style>
:root{--green:#06C755;--navy:#0a0a52;--bg:#f4f6f8;--card:#fff;--gray:#8a93a0;--line:#e3e7ec;--red:#e23b3b;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg);color:#1b1f24;padding-bottom:env(safe-area-inset-bottom);}
header{background:var(--navy);color:#fff;padding:calc(12px + env(safe-area-inset-top)) 14px 12px;display:flex;align-items:center;gap:10px;}
header .dot{width:22px;height:22px;border-radius:6px;background:var(--green);display:inline-block;flex:none;}
header h1{font-size:15px;margin:0;font-weight:700;flex:1;line-height:1.3;}
.backbtn{flex:none;display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:10px;padding:7px 11px;font-size:13px;font-weight:700;text-decoration:none;cursor:pointer;white-space:nowrap;}
.backbtn:active{transform:scale(.96);}
.wrap{max-width:680px;margin:0 auto;padding:14px;}
.resumeRow{margin-bottom:10px;}
#resume{width:100%;background:var(--green);color:#fff;border:none;font-weight:700;padding:13px;font-size:15px;border-radius:12px;}
#resume:disabled{background:#c7ccd2;cursor:default;}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;}
select,button{font-family:inherit;font-size:14px;border-radius:10px;border:1px solid var(--line);background:#fff;padding:9px 12px;cursor:pointer;}
select{flex:1;min-width:140px;}
button:active{transform:scale(.97);}
.bar{height:8px;background:#e3e7ec;border-radius:99px;overflow:hidden;margin:6px 0 4px;}
.bar > i{display:block;height:100%;background:var(--green);width:0;transition:width .3s;}
.stat{display:flex;justify-content:space-between;font-size:12px;color:var(--gray);margin-bottom:12px;}
.stat b{color:#1b1f24;}
.card{background:var(--card);border-radius:18px;box-shadow:0 4px 18px rgba(10,10,40,.08);padding:20px 18px 18px;position:relative;}
.tagrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.tag{font-size:11px;font-weight:700;color:var(--green);background:#eafaf0;padding:4px 10px;border-radius:99px;}
.num{font-size:12px;color:var(--gray);}
.qlabel{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--gray);margin-bottom:8px;}
.qtext{font-size:19px;line-height:1.6;font-weight:700;margin-bottom:16px;}
.opt{display:flex;align-items:flex-start;gap:10px;border:2px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer;background:#fff;transition:.12s;}
.opt:hover{border-color:#cfd6df;}
.opt input{width:20px;height:20px;margin-top:1px;accent-color:var(--navy);flex:none;}
.opt .txt{font-size:15px;line-height:1.6;flex:1;}
.opt .mark{font-size:22px;font-weight:800;line-height:1;flex:none;width:24px;text-align:center;}
.opt.correct{border-color:var(--green);background:#eafaf0;}
.opt.wrong{border-color:var(--red);background:#fdeaea;}
.opt.disabled{cursor:default;}
.feedback{text-align:center;font-size:17px;font-weight:800;margin:6px 0 2px;min-height:24px;}
.feedback.ok{color:var(--green);}
.feedback.ng{color:var(--red);}
.nav{display:flex;gap:10px;margin-top:14px;}
.nav button{flex:1;}
.nav .primary{background:var(--green);color:#fff;border:none;font-weight:700;}
.modeRow{display:flex;gap:8px;margin-bottom:10px;}
.modeRow button{flex:1;font-size:13px;padding:8px;}
.modeRow button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.done{text-align:center;padding:46px 20px;}
.foot{text-align:center;font-size:11px;color:var(--gray);margin:18px 0;}
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>LINE公式アカウント Basic 4択クイズ</h1>
  <a class="backbtn" href="../">← メニュー</a>
</header>
<div class="wrap">
  <div class="resumeRow"><button id="resume">▶ 前回の続きから再開</button></div>
  <div class="modeRow">
    <button id="mAll" class="on">全問題</button>
    <button id="mWeak">間違えた問題だけ</button>
  </div>
  <div class="controls">
    <select id="secSel"></select>
    <button id="shuffle">🔀 シャッフル</button>
    <button id="reset">↺ 成績リセット</button>
  </div>
  <div class="bar"><i id="prog"></i></div>
  <div class="stat"><span>解答 <b id="pdone">0</b> / <b id="ptot">0</b></span><span>正解 <b id="pknown">0</b>　不正解 <b id="pweak">0</b>　正答率 <b id="prate">-</b></span></div>
  <div id="cardArea"></div>
  <div class="nav">
    <button id="prev">← 前へ</button>
    <button class="primary" id="next">次へ →</button>
  </div>
  <p class="foot">選択肢のチェックボックスを選ぶと自動で答え合わせ（○＝正解／×＝不正解）。「メニュー」を押しても成績・進捗は保存され、「▶ 前回の続きから再開」で続きから再開できます。<br>LINEヤフーマーケティングキャンパス「LINE公式アカウントベーシック」教材より作成</p>
</div>
<script>
const DATA = [{"sec": "1.紹介", "q": "LINEの月間アクティブユーザー数は約何人か（2025年12月末時点・自社調べ）", "a": "約1億人。日本の人口の約7割以上をカバーしている。", "d": ["約9,500万人。日本の人口の約6割をカバーしている。", "約8,000万人。日本の人口の約5割をカバーしている。", "約1億2,000万人。日本の人口のほぼ全てをカバーしている。"]}, {"sec": "1.紹介", "q": "LINE公式アカウントの3つの強みは", "a": "①圧倒的なリーチ力 ②1対1のコミュニケーション ③ユーザーとの深いつながり", "d": ["①低コストな運用 ②多言語対応 ③24時間自動応答", "①拡散力の高さ ②匿名でのやり取り ③無制限の広告配信", "①検索エンジン最適化 ②フォロワーの自動増加 ③テレビ広告との連携"]}, {"sec": "1.紹介", "q": "プッシュ通知の強みと、メッセージを閲覧するユーザーの割合は", "a": "メッセージ伝達率の高さと店舗への高い送客力。アカウントと友だちになった約70%近くのユーザーがメッセージを閲覧している。", "d": ["拡散力の高さと低コスト。約30%のユーザーが閲覧している。", "検索性の高さと多言語対応。約50%のユーザーが閲覧している。", "自動応答による即時性。約90%のユーザーが閲覧している。"]}, {"sec": "1.紹介", "q": "LINE公式アカウントの開設業種で最も多い上位3業種は", "a": "①ショッピング・小売店18% ②飲食店・レストラン17% ③美容・サロン13%", "d": ["①飲食店・レストラン25% ②美容・サロン18% ③医療機関12%", "①美容・サロン20% ②ショッピング・小売店15% ③教育・習い事10%", "①ファッション22% ②飲食店・レストラン16% ③自動車・バイク9%"]}, {"sec": "1.紹介", "q": "料金プランの3種類と、それぞれの月額固定費・無料メッセージ通数は", "a": "コミュニケーションプラン（無料／200通）、ライトプラン（5,000円／5,000通）、スタンダードプラン（15,000円／30,000通）。費用は全て税別。", "d": ["コミュニケーションプラン（無料／500通）、ライトプラン（3,000円／3,000通）、スタンダードプラン（10,000円／20,000通）。", "コミュニケーションプラン（無料／100通）、ライトプラン（5,000円／15,000通）、スタンダードプラン（20,000円／50,000通）。", "フリープラン（無料／300通）、ベーシックプラン（8,000円／8,000通）、プレミアムプラン（18,000円／40,000通）。"]}, {"sec": "1.紹介", "q": "スタンダードプランの追加メッセージ従量料金は", "a": "〜3円/通。コミュニケーション・ライトプランは追加配信不可。", "d": ["〜5円/通。全プランで追加配信が可能。", "〜1円/通。ライトプランのみ追加配信が可能。", "〜10円/通。コミュニケーションプランのみ追加配信が可能。"]}, {"sec": "1.紹介", "q": "料金プランが改定された日付は", "a": "2023年6月1日。", "d": ["2022年6月1日。", "2023年4月1日。", "2024年1月1日。"]}, {"sec": "1.紹介", "q": "LINE VOOM投稿の料金は", "a": "無料（従量課金の対象外）。", "d": ["1投稿につき3円の従量課金がかかる。", "スタンダードプランのみ無料で、他プランは有料。", "月10投稿まで無料で、それ以降は有料。"]}, {"sec": "1.紹介", "q": "プラン変更は可能か。アップグレード／ダウングレードの扱いは", "a": "アップグレードだけでなくダウングレードも月単位で対応可能。", "d": ["アップグレードのみ可能で、ダウングレードはできない。", "ダウングレードのみ可能で、アップグレードはできない。", "プラン変更は年単位でのみ対応可能。"]}, {"sec": "1.紹介", "q": "プラン変更で「月中反映」となる変更は", "a": "コミュニケーション→ライトorスタンダード、ライト→スタンダード（=アップグレード方向は月中反映）。", "d": ["ライト→コミュニケーション、スタンダード→ライト（ダウングレード方向）。", "すべてのプラン変更が月中反映となる。", "スタンダード→コミュニケーションのみ月中反映となる。"]}, {"sec": "1.紹介", "q": "プラン変更で「翌月反映」となる変更は", "a": "ライト→コミュニケーション、スタンダード→ライトorコミュニケーション（=ダウングレード方向は翌月反映）。", "d": ["コミュニケーション→ライト、ライト→スタンダード（アップグレード方向）。", "すべてのプラン変更が翌月反映となる。", "コミュニケーション→スタンダードのみ翌月反映となる。"]}, {"sec": "1.紹介", "q": "無料通数に「加算されない」メッセージ4つは", "a": "①あいさつメッセージ ②応答メッセージ ③LINEチャットの送受信 ④Messaging APIの「Reply API」", "d": ["メッセージ配信、ステップ配信、リッチメッセージ、LINE VOOM投稿", "あいさつメッセージ、リッチメッセージ、クーポン配信、Push API", "応答メッセージ、カードタイプメッセージ、ショップカード、Broadcast API"]}, {"sec": "1.紹介", "q": "料金プランによる機能差はあるか", "a": "機能差はない。ただしオプション機能には別途お申込みが必要。", "d": ["上位プランほど使える機能が増える。", "無料プランではメッセージ配信機能が使えない。", "認証済アカウントのみ全機能が使える。"]}, {"sec": "1.紹介", "q": "オプション機能の例を挙げよ", "a": "LINEプロモーションスタンプ、LINE通知メッセージ、LINEチャットPlus、LINEコールPlus、LINEオーディエンスマッチ など。", "d": ["リッチメニュー、クーポン、ショップカード、ステップ配信", "あいさつメッセージ、応答メッセージ、リサーチ、LINE VOOM", "カードタイプメッセージ、リッチビデオメッセージ、LINE Tag、分析機能"]}, {"sec": "1.紹介", "q": "ベーシックIDとプレミアムIDの違いは", "a": "ベーシックID＝0円・@+3桁数字+5桁英字（ランダム）・自動発行。プレミアムID＝100円(税別)/月 または1,200円(税別)/年・@+指定文字列。", "d": ["ベーシックID＝0円・@+5桁数字・自動発行。プレミアムID＝200円/月・@+指定文字列。", "ベーシックID＝有料でランダム発行。プレミアムID＝無料で文字列を指定できる。", "ベーシックID＝0円・@+4桁英字+4桁数字。プレミアムID＝500円/月 または3,000円/年。"]}, {"sec": "1.紹介", "q": "プレミアムIDで重複するIDは取得できるか", "a": "重複するIDを取得することはできない。", "d": ["重複するIDも追加料金を払えば取得できる。", "同一企業内であれば重複するIDを取得できる。", "重複IDは1アカウントにつき1つまで取得できる。"]}, {"sec": "1.紹介", "q": "アカウントタイプの2種類は", "a": "認証済アカウントと未認証アカウント。", "d": ["個人アカウントと法人アカウント。", "無料アカウントと有料アカウント。", "公式アカウントと一般アカウント。"]}, {"sec": "1.紹介", "q": "認証済アカウントの特徴は", "a": "所定の審査を通過するとアカウントバッジが付与され、LINEアプリ内の検索結果に表示される。", "d": ["審査なしで誰でも取得でき、検索結果に表示される。", "有料プランの契約だけでバッジが付与される。", "友だちが1,000人を超えると自動的にバッジが付与される。"]}, {"sec": "1.紹介", "q": "未認証アカウントの特徴は", "a": "個人・法人問わず審査不要で取得できる。基本機能は認証済と変わらず有料プラン変更やプレミアムID購入も可能。ただしLINEアプリ内の検索結果には表示されない。", "d": ["法人のみ取得でき、検索結果にも表示される。", "審査が必要で、無料プランしか使えない。", "有料プランへの変更やプレミアムID購入はできない。"]}, {"sec": "1.紹介", "q": "認証済アカウント特有でできることは", "a": "バッジ付与、アカウント（友だち）検索結果に表示、請求書決済、LINEキャラクターの店舗用ポスターDL、「友だち追加広告」の利用。", "d": ["メッセージ配信、リッチメニュー、クーポン発行、ステップ配信。", "LINE VOOM投稿、無制限のメッセージ配信、多言語対応。", "プレミアムIDの無料取得、月額料金の割引、専用サポート。"]}, {"sec": "2.開設", "q": "WEB版管理画面・管理アプリへのログインに必要なものは", "a": "LINEヤフー Business ID の登録。", "d": ["個人のLINEアカウントのみ。", "法人番号と印鑑証明。", "Yahoo! JAPAN ID とクレジットカード。"]}, {"sec": "2.開設", "q": "LINEヤフー Business IDの登録方法2つは", "a": "①メールアドレスから登録 ②LINEアカウントから登録。", "d": ["電話番号から登録／FAXから登録。", "法人番号から登録／銀行口座から登録。", "SNS連携から登録／店頭での登録。"]}, {"sec": "2.開設", "q": "2024年7月から、LINEヤフー Business ID登録時に必要になったものは", "a": "SMS認証。", "d": ["本人確認書類の提出。", "二段階認証アプリの設定。", "クレジットカードの登録。"]}, {"sec": "2.開設", "q": "新規開設はどこから行うか", "a": "Webサイト（LINEヤフー for Business）及び管理アプリから。", "d": ["LINEアプリのみから。", "店頭窓口での申し込みのみ。", "メールでの申請のみ。"]}, {"sec": "2.開設", "q": "開設からお支払いまでの流れは", "a": "LINEヤフー Business ID登録 → 必要事項の登録／審査（※審査は認証済アカウントのみ）→ お支払い。", "d": ["お支払い → LINEヤフー Business ID登録 → 審査。", "必要事項の登録 → お支払い → 審査（全アカウント必須）。", "審査 → LINEヤフー Business ID登録 → 必要事項の登録。"]}, {"sec": "2.開設", "q": "申し込みフォームで申込完了すると、まずどのアカウントが開設されるか", "a": "未認証アカウントが開設される。認証審査を申し込んだ場合は審査通過後に認証済アカウントに変更される。", "d": ["申込完了と同時に認証済アカウントが開設される。", "仮アカウントが開設され、審査後に未認証アカウントになる。", "個人アカウントが開設され、後から法人アカウントに変更する。"]}, {"sec": "2.開設", "q": "アカウント名の文字数制限は。認証済での変更可否は", "a": "20文字以内。認証済アカウントは作成後にお申込み名称を変更することはできない。", "d": ["10文字以内。認証済アカウントはいつでも変更できる。", "30文字以内。未認証アカウントのみ変更できない。", "50文字以内。すべてのアカウントで変更できない。"]}, {"sec": "2.開設", "q": "利用できない可能性のある業種・業態の例は", "a": "医療、出会い、アダルト、ネット関連ビジネス、連鎖販売取引、クレジットカード現金化、ギャンブル、個人情報、模倣品/海賊版。", "d": ["飲食、小売、美容、教育、不動産、金融。", "製造業、IT、運輸、農業、建設。", "公共機関、学校、病院、自治体。"]}, {"sec": "3.運用の流れ", "q": "「施策の5W1H」とは", "a": "だれが・いつ・どこで・なにを・なぜ・どのように、を考えて運用すること。", "d": ["売上・利益・費用・期間・人員・場所を管理すること。", "商品・価格・流通・販促の4つを設計すること。", "認知・興味・比較・購入・継続の流れを設計すること。"]}, {"sec": "3.運用の流れ", "q": "5W1Hの対応：Why／Where／Who／What／When／Howはそれぞれ何の決定か", "a": "Why=目的・KPI設定、Where=アカウント設定、Who=配信セグメントの決定、What=訴求内容の決定、When=配信タイミングの決定、How=クリエイティブの決定。", "d": ["Why＝訴求内容、Where＝配信タイミング、Who＝目的・KPI、What＝セグメント、When＝設定、How＝予算。", "Who＝訴求内容、What＝配信セグメント、When＝クリエイティブ、Where＝KPI、Why＝設定、How＝タイミング。", "Why＝クリエイティブ、Where＝訴求内容、Who＝タイミング、What＝KPI、When＝設定、How＝セグメント。"]}, {"sec": "3.運用の流れ", "q": "施策の5W1Hはいつまでに検討・実施するのが重要か", "a": "開設前〜開設後3ヶ月以内。", "d": ["開設後6ヶ月〜1年以内。", "開設後1ヶ月以内のみ。", "開設前のみ（開設後は不要）。"]}, {"sec": "3.運用の流れ", "q": "施策の運用サイクルは", "a": "Plan・Do → Action → Check。", "d": ["Research → Plan → Sales。", "認知 → 興味 → 購入 → 継続。", "Check → Plan → Do（Actionは含まない）。"]}, {"sec": "3.運用の流れ", "q": "Who（配信セグメント）で、配信ボリュームを確保したい際の注意点は", "a": "属性（フィルター）設定を加えすぎないように注意する。", "d": ["できるだけ多くのフィルターを重ねて精度を上げる。", "配信回数を毎日に増やして到達を確保する。", "配信時間を深夜に集中させる。"]}, {"sec": "3.運用の流れ", "q": "What（訴求内容）を考える際に決めておくとよいものは", "a": "お客様像である「ペルソナ」を決めておくと考えやすい。", "d": ["競合他社の価格表を決めておくと考えやすい。", "配信予算の上限を決めておくと考えやすい。", "使用する画像の枚数を決めておくと考えやすい。"]}, {"sec": "3.運用の流れ", "q": "How（クリエイティブ）のポイントは", "a": "シンプルに訴求内容がわかると反応を得やすく、トーク画面で目立つ画像や動画は目をひきやすい。", "d": ["できるだけ多くの情報を詰め込むほど反応を得やすい。", "テキストのみで画像を使わない方が反応を得やすい。", "配信回数を増やすほどクリエイティブの反応が上がる。"]}, {"sec": "4.目標・KPI", "q": "目的（ファネル）の5段階は", "a": "認知 → 興味検討 → 獲得 → リテンション → ユーザー満足度向上。", "d": ["集客 → 販売 → 在庫 → 配送 → 返品。", "友だち追加 → ブロック → 再追加 → 購入 → 解約。", "興味 → 認知 → 満足 → 獲得 → 離脱。"]}, {"sec": "4.目標・KPI", "q": "代表的な目的の例は", "a": "認知向上、興味・検討促進、獲得・LTV向上、満足度向上、来店促進・O2O。", "d": ["友だち削除、ブロック解除、配信停止、退会防止。", "広告費削減、人件費削減、在庫圧縮、原価低減。", "フォロワー購入、いいね数増加、シェア拡大、バズ創出。"]}, {"sec": "4.目標・KPI", "q": "友だちの「量」と「質」とは何を指すか", "a": "量＝友だちのボリューム（どれだけ増やせるか）、質＝友だちとの関与度（どれだけ深い関係を目指すか）。", "d": ["量＝配信回数、質＝メッセージの文字数。", "量＝ブロック率、質＝開封率の高さ。", "量＝広告予算、質＝クリエイティブの完成度。"]}, {"sec": "4.目標・KPI", "q": "「垂直立ち上げ的な集め方」が有効なのはどんな時か", "a": "直近で大型キャンペーンやイベントがあるとき。スタンプなどで短期間に大規模な友だちを集める。", "d": ["スモールスタートで様子を見たいとき。", "勝ちパターンが分かってから徐々に増やしたいとき。", "予算をかけずにゆっくり集めたいとき。"]}, {"sec": "4.目標・KPI", "q": "「緩やかな立ち上げ方」が有効なのはどんな時か", "a": "スモールスタートを想定している際。メッセージ配信の勝ちパターンがわかってから友だちを増やす。", "d": ["大型キャンペーンで一気に集めたいとき。", "スタンプで短期間に大規模に集めたいとき。", "開設初日に友だち数を最大化したいとき。"]}, {"sec": "5.初期設定", "q": "初期設定を行う場所2つは", "a": "WEB版管理画面 と 管理アプリ。両方を使える状態にしておく。", "d": ["LINEアプリ と Yahoo!管理画面。", "WEB版管理画面のみ（アプリでは設定できない）。", "管理アプリ と 店頭端末。"]}, {"sec": "5.初期設定", "q": "初期設定の主な設定項目は", "a": "アカウント設定、ビジネスプロフィール作成、公開設定（認証済のみ）、あいさつメッセージ・応答メッセージ、リッチメニュー。", "d": ["広告出稿、予算設定、ターゲティング、入札単価の設定。", "クレジットカード登録、請求書発行、税務設定。", "LINE Pay連携、ポイント発行、決済端末の登録。"]}, {"sec": "5.初期設定", "q": "ステータスメッセージに入れるとよい内容と、検索との関係は", "a": "業種・場所・店名（カタカナor英語）を入れる。ステータスメッセージは検索ワードの対象になる。", "d": ["キャンペーン情報を入れる。検索ワードの対象にはならない。", "代表者の氏名を入れる。検索ワードの対象になる。", "電話番号とメールアドレスを入れる。検索対象にはならない。"]}, {"sec": "5.初期設定", "q": "アカウント名・ステータスメッセージの文字数制限は", "a": "どちらもテキスト20文字以内。", "d": ["どちらも10文字以内。", "アカウント名は20文字、ステータスメッセージは50文字以内。", "どちらも全角30文字以内。"]}, {"sec": "5.初期設定", "q": "プロフィール画像の形式・サイズ・推奨画像サイズは", "a": "JPG/JPEG/PNG、3MB以下、推奨640px×640px。", "d": ["JPG/PNG/GIF、5MB以下、推奨1080px×1080px。", "PNGのみ、1MB以下、推奨300px×300px。", "JPG/JPEG/PNG、10MB以下、推奨512px×512px。"]}, {"sec": "5.初期設定", "q": "背景画像の推奨画像サイズは", "a": "1080px×878px（JPG/JPEG/PNG、3MB以下）。", "d": ["640px×640px（JPG/JPEG/PNG、3MB以下）。", "1920px×1080px（JPG/JPEG/PNG、5MB以下）。", "1200px×630px（JPG/PNG、1MB以下）。"]}, {"sec": "5.初期設定", "q": "管理者情報で「必須」の項目は", "a": "メールアドレス（必須）。他に管理者の氏名、所属部署、電話番号。", "d": ["電話番号（必須）。", "住所（必須）。", "法人番号（必須）。"]}, {"sec": "5.初期設定", "q": "リッチメニューに設定する画像の形式・ファイルサイズは", "a": "JPG/JPEG/PNG、1MB以下。", "d": ["JPG/JPEG/PNG、3MB以下。", "PNGのみ、5MB以下。", "GIF/PNG、10MB以下。"]}, {"sec": "5.初期設定", "q": "推奨される動作環境（ブラウザ）は。サポート外は", "a": "Chrome・Safari・Firefox・Edge の各最新版を推奨。Internet Explorer はサポート外。", "d": ["Internet Explorer・Chrome を推奨。Safariはサポート外。", "すべてのブラウザに対応しており制限はない。", "Edge・Internet Explorer のみ推奨。"]}, {"sec": "5.初期設定", "q": "1アカウントに登録できるユーザー数の上限と、1ユーザーが管理できるアカウント数は", "a": "1アカウントに対して100人まで登録可能。1ユーザーが管理できるアカウントは100個。", "d": ["1アカウントに50人まで。1ユーザーは50個まで管理できる。", "1アカウントに10人まで。1ユーザーは無制限に管理できる。", "1アカウントは無制限。1ユーザーは1個のみ管理できる。"]}, {"sec": "5.初期設定", "q": "認証URLは何回有効か", "a": "1回のみ有効。", "d": ["3回まで有効。", "24時間以内なら何回でも有効。", "無期限・無制限に有効。"]}, {"sec": "6.友だち集め", "q": "友だちの「第一候補」となるのはどんなお客様か", "a": "すでに店舗やサービスのことを知っているお客様。", "d": ["まだ店舗を知らない新規の見込み客。", "競合店舗の友だちになっているユーザー。", "広告経由でランダムに集めたユーザー。"]}, {"sec": "6.友だち集め", "q": "友だち追加を促す手法の例は", "a": "WEBサイト、SNS、販促用ポスター、メルマガ、有償ノベルティやPOPなどの設置。", "d": ["テレビCM、新聞広告、ラジオ、看板のみ。", "電話営業、訪問販売、DM郵送のみ。", "検索広告、アフィリエイト、プレスリリースのみ。"]}, {"sec": "6.友だち集め", "q": "友だち追加広告が表示される3つの面は", "a": "トークリスト、LINE NEWS、タイムライン。", "d": ["トーク画面内、プロフィール、スタンプショップ。", "LINE Pay、LINEマンガ、LINEミュージック。", "検索結果、ウォレット、設定画面。"]}, {"sec": "7.メッセージ機能", "q": "メッセージ配信とは", "a": "LINE公式アカウントを友だち追加したユーザーに向けて、企業や店舗側からメッセージを送ることができる基本機能。", "d": ["友だち以外の全LINEユーザーに一斉送信できる機能。", "ユーザー同士がやり取りできる掲示板機能。", "広告枠にバナーを表示する機能。"]}, {"sec": "7.メッセージ機能", "q": "1度のメッセージ配信で投稿できる内容は最大何種類か", "a": "同時配信に限り最大「3種類（3吹き出し）」。例：テキスト・リッチメッセージ・スタンプで1配信。", "d": ["同時配信に限り最大「5種類（5吹き出し）」。", "1種類（1吹き出し）のみ。", "最大10種類まで投稿できる。"]}, {"sec": "7.メッセージ機能", "q": "メッセージ配信の目安頻度は", "a": "週1回程度から。配信しすぎるとブロックリスクが高まる。目安は2〜4配信/月、最低月1回。", "d": ["毎日2回が目安。配信は多いほど効果的。", "月1回までに制限されている。", "週5回以上の配信が推奨されている。"]}, {"sec": "7.メッセージ機能", "q": "メッセージ配信（PUSH）とホーム/LINE VOOM投稿（PULL）の伝達率・ブロックリスクの違いは", "a": "メッセージ配信＝PUSH、伝達率◎・ブロックリスク△。ホーム投稿＝PULL、伝達率△・ブロックリスク○。", "d": ["メッセージ配信＝PULL・伝達率△、ホーム投稿＝PUSH・伝達率◎。", "どちらもPUSHで、伝達率・ブロックリスクは同じ。", "メッセージ配信＝PUSH・ブロックリスクなし、ホーム投稿＝PULL・伝達率◎。"]}, {"sec": "7.メッセージ機能", "q": "メッセージ配信の指標は配信から何日間集計されるか", "a": "配信から14日間集計される。", "d": ["配信から7日間集計される。", "配信から30日間集計される。", "配信から90日間集計される。"]}, {"sec": "7.メッセージ機能", "q": "リッチメッセージとは。タイトルの推奨文字数は", "a": "画像やテキスト情報を一つのビジュアルにまとめて訴求する機能。タイトルは最大10〜13文字程度に調整するとわかりやすい。", "d": ["自動再生される動画を配信する機能。タイトルは最大30文字程度。", "複数カードを横スライド表示する機能。タイトルは最大20文字程度。", "テキストのみを送る機能。タイトルは最大50文字程度。"]}, {"sec": "7.メッセージ機能", "q": "専門ソフトなしで画像を作成できる機能は", "a": "イメージメーカー機能。", "d": ["カードメーカー機能。", "リッチエディタ機能。", "クリエイティブスタジオ。"]}, {"sec": "7.メッセージ機能", "q": "リッチビデオメッセージの特徴は", "a": "自動再生される動画を配信。縦/横/正方形に対応し、縦型ならトーク画面いっぱいに表示。視聴ユーザーを外部サイトへ誘導もできる。", "d": ["静止画のみを配信。縦型のみ対応。外部誘導はできない。", "音声のみを配信。再生にはタップが必要。", "GIFアニメのみ配信可能。サイズは正方形固定。"]}, {"sec": "7.メッセージ機能", "q": "カードタイプメッセージとは", "a": "横スライド（カルーセル形式）で複数枚のカードタイプメッセージを配信できる機能。", "d": ["縦スクロールで1枚の長い画像を配信する機能。", "動画を全画面で自動再生する機能。", "テキストを吹き出しで連続送信する機能。"]}, {"sec": "7.メッセージ機能", "q": "セグメント機能の3つは", "a": "オーディエンス、過去の配信、フィルター。", "d": ["性別、年齢、地域。", "あいさつ、応答、ステップ。", "PUSH、PULL、Reply。"]}, {"sec": "7.メッセージ機能", "q": "フィルター機能を使うために必要なターゲットリーチ数は", "a": "100人以上。", "d": ["50人以上。", "500人以上。", "1,000人以上。"]}, {"sec": "7.メッセージ機能", "q": "「過去の配信」機能を利用できるのはどのアカウントか", "a": "認証済アカウント／プレミアムアカウントのみ。", "d": ["すべてのアカウントで利用できる。", "未認証アカウントのみ利用できる。", "スタンダードプラン契約者のみ利用できる。"]}, {"sec": "7.メッセージ機能", "q": "あいさつメッセージとは", "a": "ユーザーがLINE公式アカウントを友だち追加したときに、自動的にメッセージを送れる機能。", "d": ["ユーザーがメッセージを送った時に自動返信する機能。", "一定期間ごとに自動で配信する機能。", "ブロックされたユーザーに再送する機能。"]}, {"sec": "7.メッセージ機能", "q": "ステップ配信とは", "a": "あらかじめ設定した条件に一致した友だちに、複数のメッセージを自動で配信できる機能。", "d": ["全友だちに同時に1通だけ配信する機能。", "キーワードに応じて自動返信する機能。", "友だち追加時に1度だけ配信する機能。"]}, {"sec": "7.メッセージ機能", "q": "ステップ配信のトリガー（起点）は", "a": "「友だち」追加がトリガー。", "d": ["メッセージ受信がトリガー。", "クーポン利用がトリガー。", "ブロック解除がトリガー。"]}, {"sec": "7.メッセージ機能", "q": "ステップ配信のPhase1・Phase2のリリース日は", "a": "Phase1＝2021年2月24日、Phase2＝2022年2月14日。", "d": ["Phase1＝2020年2月24日、Phase2＝2021年2月14日。", "Phase1＝2022年2月24日、Phase2＝2023年2月14日。", "Phase1＝2021年4月1日、Phase2＝2022年4月1日。"]}, {"sec": "7.メッセージ機能", "q": "ステップ配信の待ち時間・開始条件の設定範囲は", "a": "開始条件は1〜30日、待ち時間も1〜30日で設定できる。", "d": ["開始条件1〜7日、待ち時間1〜7日で設定できる。", "開始条件1〜90日、待ち時間1〜90日で設定できる。", "開始条件は時間単位（1〜24時間）で設定できる。"]}, {"sec": "7.メッセージ機能", "q": "応答メッセージとは", "a": "ユーザーから届くチャットでの質問に対し、特定のキーワードに登録したメッセージを自動で返信できる機能。", "d": ["友だち追加時に自動で送るメッセージ機能。", "一定期間後に自動配信するメッセージ機能。", "全友だちに一斉送信するメッセージ機能。"]}, {"sec": "7.メッセージ機能", "q": "LINE Tagとは", "a": "友だちの外部WEBサイトでの行動（購入や会員登録など）を計測できる機能。", "d": ["友だちにタグ付けして分類する機能。", "メッセージにハッシュタグを付けて拡散する機能。", "友だちのLINE内での行動だけを計測する機能。"]}, {"sec": "7.メッセージ機能", "q": "LINE Tagで設定できるコード3種類は", "a": "ベースコード、コンバージョンコード、カスタムイベントコード。", "d": ["ヘッダーコード、フッターコード、ボディコード。", "トラッキングコード、クリックコード、表示コード。", "HTMLコード、CSSコード、JavaScriptコード。"]}, {"sec": "7.メッセージ機能", "q": "メッセージの「開封」はどの時点でカウントされるか", "a": "メッセージ内のいずれかの吹き出しを100%表示した時点でカウント。左スワイプで既読にした場合はカウントされない。", "d": ["メッセージが配信された時点でカウントされる。", "トークルームを開いた瞬間にカウントされる。", "左スワイプで既読にしてもカウントされる。"]}, {"sec": "7.メッセージ機能", "q": "メッセージの「インプレッション」とは", "a": "吹き出しが表示された回数。トークルームを開いて吹き出しが100%表示されるたびにカウントされる。", "d": ["メッセージ内のURLがクリックされた回数。", "メッセージを開封したユニークユーザーの数。", "動画が最後まで再生された回数。"]}, {"sec": "8.その他機能", "q": "LINE VOOMで投稿できる内容と、料金は", "a": "動画のほかテキストや画像の投稿が可能。追加料金不要で無制限に投稿でき、メッセージと違い従量課金の対象にならない。", "d": ["動画のみ投稿可能。1投稿ごとに従量課金される。", "テキストのみ投稿可能。月10投稿まで無料。", "画像のみ投稿可能。スタンダードプランのみ無料。"]}, {"sec": "8.その他機能", "q": "LINE VOOMでシェアされるとどうなるか", "a": "フォロワーにも投稿が表示され、フォロワーを介してLINE公式アカウントの友だち以外にも情報を広げられる。いいねやコメントも可能。", "d": ["シェアされても友だち以外には表示されない。", "いいねやコメントの機能はない。", "シェアは管理者のみが行え、ユーザーはできない。"]}, {"sec": "8.その他機能", "q": "VOOM Studioとは", "a": "投稿の作成・分析・コメント管理など、LINE VOOMに関する機能が集約された管理画面。", "d": ["メッセージ配信専用の管理画面。", "動画編集だけを行うアプリ。", "広告出稿を管理する画面。"]}, {"sec": "8.その他機能", "q": "クーポンとは", "a": "商品やサービスを利用してもらうためのクーポンを、LINE公式アカウントで発行・配信・管理できる機能。", "d": ["来店ごとにポイントを貯める機能。", "アンケートでフィードバックを集める機能。", "友だちに無料でスタンプを配る機能。"]}, {"sec": "8.その他機能", "q": "クーポンの当選ユーザーが20人未満の場合の表示は", "a": "「〜19」と表示される。", "d": ["「0」と表示される。", "「非公開」と表示される。", "実数がそのまま表示される。"]}, {"sec": "8.その他機能", "q": "ショップカードとは", "a": "商品購入・来店などの特典として付与するポイントを、LINE上で発行・管理できる機能。", "d": ["割引クーポンを発行・配信する機能。", "名刺をデジタルで管理する機能。", "店舗の在庫を管理する機能。"]}, {"sec": "8.その他機能", "q": "リサーチ機能の回答形式3つは", "a": "自由回答、単一回答、複数回答。", "d": ["はい/いいえ、5段階評価、記述式。", "単一回答、画像回答、音声回答。", "必須回答、任意回答、匿名回答。"]}, {"sec": "8.その他機能", "q": "アカウント満足度調査で使うスコアと、実施間隔は", "a": "NPS®というスコアで定量的に測定。90日のインターバルを経て定期的に行うことができる（無料）。", "d": ["CSATというスコアで測定。30日ごとに実施できる。", "NPS®というスコアで測定。365日ごとに実施できる。", "CVRというスコアで測定。いつでも何度でも実施できる。"]}, {"sec": "8.その他機能", "q": "リッチメニューとは", "a": "トーク画面下部に表示され、予約やWEBページへの誘導、クーポンなど、利用してほしい機能を固定で表示できる機能。", "d": ["トーク画面上部に広告を表示する機能。", "メッセージに画像を添付する機能。", "プロフィールページに目次を表示する機能。"]}, {"sec": "8.その他機能", "q": "LINEチャットとは", "a": "LINEアプリのトーク機能を通じて、友だち一人ひとりと個別にコミュニケーションが取れる機能。グループチャットにも対応。", "d": ["全友だちに一斉送信する機能。", "AIが自動ですべての返信を行う機能。", "友だち同士をつなぐマッチング機能。"]}, {"sec": "8.その他機能", "q": "LINEコールとは。転送機能の注意点は", "a": "友だちから音声通話・ビデオ通話で無料で電話ができるサービス。固定電話への通話転送機能もあるが、転送機能はコミュニケーションプランでは利用できない。", "d": ["有料で通話できるサービス。転送は全プランで利用できる。", "音声通話のみ無料で、ビデオ通話は有料。", "転送機能はスタンダードプランのみ利用できない。"]}, {"sec": "8.その他機能", "q": "ビジネスプロフィールとは", "a": "企業やブランドの基本情報を掲載するページ。WEBでも公開されるため認知手段としても重要。", "d": ["管理者の個人情報を登録する画面。", "友だちのプロフィールを一覧する画面。", "広告の配信設定を行うページ。"]}, {"sec": "8.その他機能", "q": "ビジネスプロフィールに追加できるパーツの例は", "a": "基本情報、テキスト、コレクション、デリバリー（出前/宅配）・テイクアウト、お知らせ、クーポン、ショップカード、LINEで予約。", "d": ["広告枠、入札設定、ターゲット属性、予算。", "友だちリスト、ブロックリスト、配信履歴。", "売上レポート、在庫表、発注書、請求書。"]}, {"sec": "8.その他機能", "q": "分析機能で確認できる主な数値と、選択可能な最大期間は", "a": "友だち追加数やブロック数などを確認できる。友だち分析は最大397日間が選択可能。", "d": ["売上と利益を確認できる。最大90日間が選択可能。", "友だち追加数を確認できる。最大30日間が選択可能。", "フォロワー数を確認できる。最大1,000日間が選択可能。"]}, {"sec": "9.注意点", "q": "運用にあたって遵守すべきものは", "a": "各種法令、業界が定める自主基準やルール。", "d": ["LINEの利用規約のみ（法令は対象外）。", "社内規定のみ。", "特に遵守すべきルールはない。"]}, {"sec": "9.注意点", "q": "リンクに関する注意点は", "a": "スマートフォン（iOS・Android）で操作・閲覧できないページへのリンクは控える。", "d": ["PCでしか開けないページへのリンクを推奨する。", "外部サイトへのリンクは一切禁止されている。", "リンク先に関する制限は特にない。"]}, {"sec": "9.注意点", "q": "商用利用時に守るべきルールの例は", "a": "広告の主体者の明示、ダブルスポンサー広告の禁止、他社商品・サービス訴求の条件、リンク先の制限など。", "d": ["広告主体者は明示しなくてよく、複数スポンサー広告も自由。", "他社商品・サービスの訴求は無条件で可能。", "商用利用には特別なルールはない。"]}, {"sec": "9.注意点", "q": "投稿内容を訂正する際の注意点は", "a": "必ず訂正メッセージであることを明記して投稿する。訂正投稿も通常の投稿と同じく課金される。", "d": ["訂正投稿は無料で課金されない。", "訂正時は元の投稿を削除すれば明記は不要。", "訂正投稿は管理者にのみ通知され課金されない。"]}];
DATA.forEach((d,i)=>d.id=i);
let store={};
try{store=JSON.parse(localStorage.getItem('lineqz_v2')||'{}');}catch(e){}
function save(){try{localStorage.setItem('lineqz_v2',JSON.stringify(store));}catch(e){}}
function savePos(id){try{localStorage.setItem('lineqz_pos',String(id));}catch(e){}}
function loadPos(){try{const v=localStorage.getItem('lineqz_pos');return v==null?null:+v;}catch(e){return null;}}
const $=s=>document.querySelector(s);
let mode='all', sec='ALL', list=[], idx=0;
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const secs=[...new Set(DATA.map(d=>d.sec))];
$('#secSel').innerHTML='<option value="ALL">すべてのセクション ('+DATA.length+'問)</option>'+
  secs.map(s=>'<option value="'+s+'">'+s+' ('+DATA.filter(d=>d.sec===s).length+'問)</option>').join('');
function makeOptions(card){
  if(card._opts) return card._opts;
  const st=store[card.id];
  if(st && st.opts){ card._opts=st.opts; return card._opts; }
  card._opts=shuffleArr([card.a, ...card.d]);
  return card._opts;
}
function refreshResumeBtn(){
  const has=loadPos()!==null;
  const b=$('#resume');
  b.disabled=!has;
  b.textContent=has?'▶ 前回の続きから再開':'▶ 続きから（まだ記録がありません）';
}
function build(){
  let base=DATA.filter(d=> sec==='ALL'||d.sec===sec);
  if(mode==='weak') base=base.filter(d=>store[d.id]&&store[d.id].r==='weak');
  list=base; idx=0; render();
}
function render(){
  const tot=list.length;
  const known=list.filter(d=>store[d.id]&&store[d.id].r==='known').length;
  const weak=list.filter(d=>store[d.id]&&store[d.id].r==='weak').length;
  const done=known+weak;
  $('#ptot').textContent=tot;$('#pknown').textContent=known;$('#pweak').textContent=weak;
  $('#pdone').textContent=done;
  $('#prate').textContent=done?Math.round(known/done*100)+'%':'-';
  $('#prog').style.width=tot?(done/tot*100)+'%':'0%';
  const area=$('#cardArea');
  if(tot===0){area.innerHTML='<div class="card"><div class="done"><h2>🎉</h2><p>このカテゴリに表示する問題がありません。<br>モードやセクションを切り替えてください。</p></div></div>';refreshResumeBtn();return;}
  if(idx>=tot)idx=tot-1;if(idx<0)idx=0;
  const d=list[idx];
  savePos(d.id);
  refreshResumeBtn();
  const opts=makeOptions(d);
  const st=store[d.id];
  const answered=!!(st && st.sel!==undefined && st.sel!==null);
  const selIdx=answered?opts.indexOf(st.sel):-1;
  let html='<div class="card"><div class="tagrow"><span class="tag">'+d.sec+'</span><span class="num">'+(idx+1)+' / '+tot+'</span></div>'+
    '<div class="qlabel">Q. 次の問いの正しい答えを選んでください</div>'+
    '<div class="qtext">'+d.q+'</div>';
  opts.forEach((o,i)=>{
    const isCorrect=o===d.a;
    let cls='opt';let mark='';
    if(answered){cls+=' disabled';
      if(isCorrect){cls+=' correct';mark='<span class="mark" style="color:var(--green)">○</span>';}
      else if(i===selIdx){cls+=' wrong';mark='<span class="mark" style="color:var(--red)">×</span>';}
    }
    html+='<label class="'+cls+'" data-i="'+i+'"><input type="checkbox" '+(i===selIdx?'checked':'')+' '+(answered?'disabled':'')+'><span class="txt">'+o+'</span>'+mark+'</label>';
  });
  if(answered){
    const ok=opts[selIdx]===d.a;
    html+='<div class="feedback '+(ok?'ok':'ng')+'">'+(ok?'○ 正解！':'× 不正解')+'</div>';
  }else{html+='<div class="feedback"></div>';}
  html+='</div>';
  area.innerHTML=html;
  if(!answered){
    area.querySelectorAll('.opt').forEach(el=>{
      el.onclick=ev=>{ev.preventDefault();const i=+el.dataset.i;
        store[d.id]={r:(opts[i]===d.a)?'known':'weak', sel:opts[i], opts:opts};
        save();render();window.scrollTo({top:0,behavior:'smooth'});};
    });
  }
}
$('#next').onclick=()=>{idx=(idx+1)%Math.max(list.length,1);render();window.scrollTo(0,0);};
$('#prev').onclick=()=>{idx=(idx-1+list.length)%Math.max(list.length,1);render();window.scrollTo(0,0);};
$('#shuffle').onclick=()=>{shuffleArr(list);idx=0;render();};
$('#resume').onclick=()=>{
  mode='all';sec='ALL';
  $('#mAll').classList.add('on');$('#mWeak').classList.remove('on');$('#secSel').value='ALL';
  list=DATA.slice();
  const li=loadPos();
  let start=0;
  if(li!=null){const p=list.findIndex(d=>d.id===li); if(p>=0) start=Math.min(p+1,list.length-1);}
  idx=start; render(); window.scrollTo(0,0);
};
$('#reset').onclick=()=>{if(confirm('成績（正解・不正解）と続きの位置をすべてリセットしますか？')){store={};DATA.forEach(d=>{delete d._opts;});save();try{localStorage.removeItem('lineqz_pos');}catch(e){}build();}};
$('#secSel').onchange=e=>{sec=e.target.value;build();};
$('#mAll').onclick=()=>{mode='all';$('#mAll').classList.add('on');$('#mWeak').classList.remove('on');build();};
$('#mWeak').onclick=()=>{mode='weak';$('#mWeak').classList.add('on');$('#mAll').classList.remove('on');build();};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')$('#next').click();else if(e.key==='ArrowLeft')$('#prev').click();});
build();
</script>
